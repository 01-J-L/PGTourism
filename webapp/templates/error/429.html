{% extends "base.html" %}
{% block title %}Too Many Requests{% endblock %}
{% block content %}
<div class="pt-32 pb-20 text-center max-w-xl mx-auto px-4">
    <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="ri-spam-2-line text-4xl"></i>
    </div>
    <h1 class="text-3xl font-bold text-slate-800 mb-4">Too Many Requests</h1>
    <p class="text-slate-600 mb-6">You have made too many contact submissions or requests recently. Please wait a few minutes before trying again.</p>
    <a href="{{ url_for('views.home') }}" class="inline-block bg-slate-800 text-white px-6 py-2.5 rounded-lg font-bold text-sm">Return Home</a>
</div>
{% endblock %}
