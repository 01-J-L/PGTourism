{% extends "base.html" %}
{% block title %}Edit Travel Info{% endblock %}
{% block navbar %}
<nav class="fixed top-0 w-full z-50 bg-white border-b border-slate-200 h-16 flex items-center px-8 justify-between">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('views.dashboard') }}" class="text-slate-500 hover:text-slate-800"><i class="ri-arrow-left-line text-xl"></i></a>
        <h1 class="font-bold text-slate-800">Edit Travel Info</h1>
    </div>
    <button type="submit" form="mainForm" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold text-sm">Save Changes</button>
</nav>
{% endblock %}
{% block content %}
<div class="pt-24 pb-20 px-8 max-w-4xl mx-auto">
    <form id="mainForm" method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Item 1 -->
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <h3 class="font-bold text-slate-700 mb-2">Item 1 (Best Time)</h3>
            <input type="text" name="travel_title_1" value="{{ content.travel_title_1 }}" class="w-full border rounded p-2 mb-2">
            <textarea name="travel_text_1" rows="4" class="w-full border rounded p-2">{{ content.travel_text_1 }}</textarea>
        </div>
        <!-- Item 2 -->
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <h3 class="font-bold text-slate-700 mb-2">Item 2 (Getting Here)</h3>
            <input type="text" name="travel_title_2" value="{{ content.travel_title_2 }}" class="w-full border rounded p-2 mb-2">
            <textarea name="travel_text_2" rows="4" class="w-full border rounded p-2">{{ content.travel_text_2 }}</textarea>
        </div>
        <!-- Item 3 -->
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <h3 class="font-bold text-slate-700 mb-2">Item 3 (Where to Stay)</h3>
            <input type="text" name="travel_title_3" value="{{ content.travel_title_3 }}" class="w-full border rounded p-2 mb-2">
            <textarea name="travel_text_3" rows="4" class="w-full border rounded p-2">{{ content.travel_text_3 }}</textarea>
        </div>
    </form>
</div>
{% endblock %}
{% block footer %}{% endblock %}
