{% extends "base.html" %}

{% block title %}Administrator Access | Padre Garcia{% endblock %}

{% block head %}
<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: '#1e3a8a',
                    secondary: '#ca8a04',
                    dark: '#0f172a'
                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                    serif: ['Playfair Display', 'serif'],
                }
            }
        }
    }
</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.min.css" rel="stylesheet">
<style>
    .admin-bg {
        background: linear-gradient(to bottom right, #0f172a, #1e3a8a);
        background-size: cover;
    }
    .default-nav { display: none !important; }
</style>
{% endblock %}

{% block content %}
<div class="admin-bg min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
    
    <!-- Background Abstract Shapes -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-20 pointer-events-none">
         <div class="absolute top-10 left-10 w-64 h-64 bg-primary rounded-full blur-3xl"></div>
         <div class="absolute bottom-10 right-10 w-96 h-96 bg-secondary rounded-full blur-3xl"></div>
    </div>

    <div class="bg-slate-900/50 backdrop-blur-xl border border-slate-700/50 p-10 rounded-2xl shadow-2xl w-full max-w-md relative z-10">
        
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-red-600/10 rounded-full flex items-center justify-center border border-red-500/30 mb-4 shadow-[0_0_15px_rgba(220,38,38,0.5)]">
                <i class="ri-shield-keyhole-line text-3xl text-red-500"></i>
            </div>
            <h2 class="text-2xl font-serif text-white font-bold tracking-wide uppercase">Admin Portal</h2>
            <p class="text-slate-400 text-xs mt-2 uppercase tracking-widest">Authorized Personnel Only</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-slate-300 text-xs font-bold uppercase mb-2">Admin Email</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-slate-500"><i class="ri-admin-line"></i></span>
                    <input type="email" name="email" required 
                        class="w-full bg-slate-800 border border-slate-700 text-white pl-10 pr-4 py-3 rounded-lg focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition shadow-inner">
                </div>
            </div>

            <div>
                <label class="block text-slate-300 text-xs font-bold uppercase mb-2">Secure Key</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-slate-500"><i class="ri-key-2-line"></i></span>
                    <input type="password" name="password" required 
                        class="w-full bg-slate-800 border border-slate-700 text-white pl-10 pr-4 py-3 rounded-lg focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition shadow-inner">
                </div>
            </div>

            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-red-600/30 transition-all flex items-center justify-center gap-2">
                <i class="ri-login-circle-line"></i> Authenticate
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{{ url_for('views.home') }}" class="text-slate-500 hover:text-white text-sm transition flex items-center justify-center gap-2">
                <i class="ri-arrow-left-s-line"></i> Return to Site
            </a>
        </div>
    </div>
</div>
{% endblock %}
