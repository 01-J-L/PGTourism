{% extends "base.html" %}
{% block title %}Edit Home Hero{% endblock %}
{% block navbar %}
<nav class="fixed top-0 w-full z-50 bg-white border-b border-slate-200 h-16 flex items-center px-8 justify-between">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('views.dashboard') }}" class="text-slate-500 hover:text-slate-800"><i class="ri-arrow-left-line text-xl"></i></a>
        <h1 class="font-bold text-slate-800">Edit Home Hero</h1>
    </div>
    <button type="submit" form="mainForm" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold text-sm">Save Changes</button>
</nav>
{% endblock %}
{% block content %}
<div class="pt-24 pb-20 px-8 max-w-3xl mx-auto">
    <form id="mainForm" method="POST" enctype="multipart/form-data" class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div><label class="text-xs font-bold uppercase text-slate-500 mb-1 block">Title Line 1</label><input type="text" name="hero_title_1" value="{{ content.hero_title_1 }}" class="w-full border rounded p-2"></div>
            <div><label class="text-xs font-bold uppercase text-slate-500 mb-1 block">Title Line 2</label><input type="text" name="hero_title_2" value="{{ content.hero_title_2 }}" class="w-full border rounded p-2"></div>
        </div>
        <div><label class="text-xs font-bold uppercase text-slate-500 mb-1 block">Subtitle</label><textarea name="hero_subtitle" rows="3" class="w-full border rounded p-2">{{ content.hero_subtitle }}</textarea></div>
        <div>
            <label class="text-xs font-bold uppercase text-slate-500 mb-1 block">Background Image</label>
            <input type="file" name="hero_image_file" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            {% if content.hero_image_path %}<img src="{{ url_for('static', filename=content.hero_image_path.replace('static/', '')) if 'static/uploads' in content.hero_image_path else content.hero_image_path }}" class="mt-4 h-32 object-cover rounded">{% endif %}
        </div>
    </form>
</div>
{% endblock %}
{% block footer %}{% endblock %}
