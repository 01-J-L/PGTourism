

{% extends "base.html" %}

{% block title %}Admin Login | Tourism Padre Garcia{% endblock %}

{% block head %}
<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.min.css" rel="stylesheet">
<style>
    .hero-bg {
        background: linear-gradient(to bottom, rgba(15, 23, 42, 0.9), rgba(30, 58, 138, 0.8)),
                    url("{{ url_for('static', filename='images/municipal.jpg') }}");
        background-size: cover;
        background-position: center;
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .default-nav { display: none !important; }
</style>
{% endblock %}

{% block content %}
<div class="hero-bg min-h-screen flex items-center justify-center px-4">
    <div class="glass-card p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-sm relative">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-white/10 rounded-full flex items-center justify-center border border-white/10 mb-4 text-yellow-400 text-3xl">
                <i class="ri-shield-user-line"></i>
            </div>
            <h2 class="text-2xl font-serif text-white font-bold tracking-wide">Admin Access</h2>
            <p class="text-slate-400 text-xs mt-1">Authorized personnel only</p>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-slate-300 text-xs font-bold uppercase mb-2">Username</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-slate-500"><i class="ri-user-line"></i></span>
                    <!-- Changed type="email" to type="text" to accept 'admin' -->
                    <input type="text" name="email" required placeholder="admin"
                        class="w-full bg-slate-900/50 border border-slate-700 text-white pl-10 pr-4 py-3 rounded-lg focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition placeholder-slate-600">
                </div>
            </div>

            <div>
                <label class="block text-slate-300 text-xs font-bold uppercase mb-2">Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-slate-500"><i class="ri-lock-password-line"></i></span>
                    <input type="password" name="password" required placeholder="••••••••"
                        class="w-full bg-slate-900/50 border border-slate-700 text-white pl-10 pr-4 py-3 rounded-lg focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition placeholder-slate-600">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-slate-900 font-bold py-3 rounded-lg shadow-lg transition mt-4">
                Login
            </button>
        </form>
        
        <div class="mt-8 text-center border-t border-white/10 pt-6">
            <a href="{{ url_for('views.home') }}" class="text-slate-400 hover:text-white text-sm flex items-center justify-center gap-2 transition">
                <i class="ri-arrow-left-line"></i> Return to Site
            </a>
        </div>
    </div>
</div>
{% endblock %}
