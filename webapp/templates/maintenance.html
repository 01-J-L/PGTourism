

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | Padre Garcia</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Background Decoration -->
    <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600/30 rounded-full blur-[128px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-yellow-600/20 rounded-full blur-[128px]"></div>

    <div class="relative z-10 text-center px-4 max-w-2xl">
        
        <!-- Icon -->
        <div class="w-20 h-20 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-[0_0_40px_rgba(234,179,8,0.4)] animate-pulse">
            <i class="ri-tools-fill text-4xl text-slate-900"></i>
        </div>

        <!-- Text -->
        <h1 class="text-5xl md:text-6xl font-bold mb-6 tracking-wide">Under Maintenance</h1>
        <p class="text-slate-400 text-lg md:text-xl leading-relaxed mb-10">
            We are currently updating our website to serve you better. <br>
            Please check back with us shortly.
        </p>

        <div class="h-1 w-24 bg-gradient-to-r from-transparent via-slate-600 to-transparent mx-auto mb-10"></div>

        

    </div>

</body>
</html>
